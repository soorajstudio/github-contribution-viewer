<!DOCTYPE html>
<html>
<head>
<title>GitHub Contribution Viewer & 3D Skyline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* GitHub dark theme base */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 40px;
    margin: 0;
}

/* container */
.container {
    max-width: 900px;
    margin: auto;
}

/* search section */
.controls {
    margin-bottom: 30px;
    display: flex;
    gap: 10px;
}

input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    outline: none;
}
input:focus { border-color: #58a6ff; }

button.fetch-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #238636;
    background: #238636;
    color: white;
    cursor: pointer;
    font-weight: 500;
}
button.fetch-btn:hover { background: #2ea043; }

/* Header above calendar */
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    margin-top: 30px;
}
.calendar-header h2 {
    font-size: 16px;
    font-weight: 400;
    margin: 0;
    color: #e6edf3;
}

/* Dropdown styling */
.year-select {
    background-color: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 14px;
    outline: none;
    cursor: pointer;
}
.year-select:focus { border-color: #58a6ff; }
.year-select:hover { background-color: #30363d; }

/* 2D Calendar Box */
.calendar-box {
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    background-color: #0d1117;
    overflow-x: auto;
    margin-bottom: 30px;
}

.months-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 5px;
    margin-left: 35px;
    width: 680px; 
}

.graph-container { display: flex; }

.days-of-week {
    display: grid;
    grid-template-rows: repeat(7, 10px);
    gap: 3px;
    font-size: 12px;
    color: #8b949e;
    margin-right: 10px;
    text-align: right;
    line-height: 10px;
}

.squares {
    display: grid;
    grid-template-rows: repeat(7, 10px);
    grid-auto-flow: column;
    grid-auto-columns: 10px;
    gap: 3px;
}

.square {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background-color: #161b22;
    outline: 1px solid rgba(27, 31, 35, 0.06);
    outline-offset: -1px;
}
.square.spacer {
    background-color: transparent !important;
    outline: none;
}

/* 2D Grid Colors */
.square[data-level="0"] { background: #161b22; }
.square[data-level="1"] { background: #0e4429; }
.square[data-level="2"] { background: #006d32; }
.square[data-level="3"] { background: #26a641; }
.square[data-level="4"] { background: #39d353; }

.legend {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    font-size: 12px;
    color: #8b949e;
    margin-top: 15px;
    gap: 4px;
}
.legend .square { margin: 0 2px; }

/* --- 3D Skyline Box --- */
.skyline-header {
    font-size: 16px;
    color: #e6edf3;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.reset-btn {
    background: transparent;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}
.reset-btn:hover { background: #21262d; color: #c9d1d9; }

#skyline-container {
    width: 100%;
    height: 500px;
    border: 1px solid #30363d;
    border-radius: 6px;
    background-color: #0d1117;
    overflow: hidden;
    position: relative;
    cursor: grab;
}
#skyline-container:active {
    cursor: grabbing;
}
.controls-hint {
    position: absolute;
    bottom: 10px;
    left: 15px;
    color: #8b949e;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
}

</style>
</head>
<body>

<div class="container">
    <h2>GitHub Contribution Graph & 3D Skyline</h2>
    <div class="controls">
        <input id="username" placeholder="Enter GitHub username" value="torvalds">
        <button class="fetch-btn" onclick="loadGraph()">Show Activity</button>
    </div>

    <div class="calendar-header">
        <h2 id="contrib-title">0 contributions</h2>
        <select id="year-dropdown" class="year-select" style="display: none;" onchange="handleYearChange()"></select>
    </div>
    
    <div class="calendar-box">
        <div class="months-header">
            <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span>
            <span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
        </div>
        
        <div class="graph-container">
            <div class="days-of-week">
                <span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span>
            </div>
            <div class="squares" id="grid-squares"></div>
        </div>
        
        <div class="legend">
            <span>Less</span>
            <div class="square" data-level="0"></div>
            <div class="square" data-level="1"></div>
            <div class="square" data-level="2"></div>
            <div class="square" data-level="3"></div>
            <div class="square" data-level="4"></div>
            <span>More</span>
        </div>
    </div>

    <div class="skyline-header">
        <span>3D Contribution Skyline</span>
        <button class="reset-btn" onclick="resetCamera()">Reset View</button>
    </div>
    <div id="skyline-container">
        <div class="controls-hint">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let allContributions = [];

// GitHub colors
const colors3D = {
    0: '#161b22',
    1: '#0e4429',
    2: '#006d32',
    3: '#26a641',
    4: '#39d353'
};

const materialCache = {};
const geometryCache = {};

let scene, camera, renderer, controls, cityGroup;

function init3D() {
    const container = document.getElementById('skyline-container');
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070a); 

    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(-50, 40, 40);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true; 
    controls.autoRotateSpeed = 0.6;
    controls.maxPolarAngle = Math.PI / 2 + 0.1;

    // Atmospheric City Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.4); 
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x88bbff, 0.8); 
    dirLight.position.set(-20, 50, 20);
    scene.add(dirLight);

    cityGroup = new THREE.Group();
    scene.add(cityGroup);

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate3D();
}

function animate3D() {
    requestAnimationFrame(animate3D);
    controls.update();
    renderer.render(scene, camera);
}

function resetCamera() {
    camera.position.set(-50, 40, 40);
    controls.target.set(0, 0, 0);
}

// Generates glowing windows for the sides of the buildings
function getGeometry(height) {
    if (geometryCache[height]) return geometryCache[height];
    const geo = new THREE.BoxGeometry(1, height, 1);
    geometryCache[height] = geo;
    return geo;
}

function getBuildingMaterial(level, height) {
    if (level === 0) return new THREE.MeshLambertMaterial({ color: 0x161b22 });
    
    const hKey = Math.max(1, Math.round(height));
    const cacheKey = `${level}-${hKey}`;
    if (materialCache[cacheKey]) return materialCache[cacheKey];

    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#0a0c10'; 
    ctx.fillRect(0, 0, 64, 64);

    ctx.fillStyle = colors3D[level];
    for (let x = 6; x < 64; x += 14) {
        for (let y = 6; y < 64; y += 14) {
            if (Math.random() > 0.15) {
                ctx.fillRect(x, y, 8, 10);
            }
        }
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(1, hKey / 1.5); 
    texture.magFilter = THREE.NearestFilter; 
    
    const matSide = new THREE.MeshStandardMaterial({
        map: texture,
        emissive: new THREE.Color(colors3D[level]),
        emissiveMap: texture,
        emissiveIntensity: 0.8,
        roughness: 0.9,
    });
    
    const matTop = new THREE.MeshLambertMaterial({ color: colors3D[level] });
    const materials = [matSide, matSide, matTop, matTop, matSide, matSide];
    
    materialCache[cacheKey] = materials;
    return materials;
}


// --- BASE PLATFORM TEXTURES ---
function createTextTexture(text, canvasWidth, canvasHeight, flip = false) {
    const canvas = document.createElement('canvas');
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#21262d'; 
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, canvasWidth, canvasHeight);
    
    if (flip) {
        ctx.translate(canvasWidth, 0);
        ctx.scale(-1, 1);
    }
    
    ctx.font = 'bold 44px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvasWidth / 2, canvasHeight / 2);
    
    const texture = new THREE.CanvasTexture(canvas);
    if(renderer) texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
    return texture;
}

function createAxisTexture(labels, baseSize, canvasWidth, canvasHeight, flip = false) {
    const canvas = document.createElement('canvas');
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#21262d';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, canvasWidth, canvasHeight);

    if (flip) {
        ctx.translate(canvasWidth, 0);
        ctx.scale(-1, 1);
    }

    ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const padding = 2.0;

    labels.forEach(lbl => {
        const ratio = (padding / 2 + lbl.pos) / baseSize;
        const x = ratio * canvasWidth;
        ctx.fillText(lbl.text, x, canvasHeight / 2);
    });

    const texture = new THREE.CanvasTexture(canvas);
    if(renderer) texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
    return texture;
}

// --- DATA FETCHING ---
async function loadGraph() {
    const user = document.getElementById("username").value.trim();
    if (!user) { alert("Enter GitHub username"); return; }

    const titleElement = document.getElementById("contrib-title");
    const dropdown = document.getElementById("year-dropdown");
    
    titleElement.innerText = "Loading data...";
    document.getElementById("grid-squares").innerHTML = "";
    dropdown.style.display = "none";
    dropdown.innerHTML = "";

    try {
        const response = await fetch(`https://github-contributions-api.jogruber.de/v4/${user}?y=all`);
        if (!response.ok) throw new Error("User not found or API limit reached.");
        
        const data = await response.json();
        allContributions = data.contributions; 
        
        let availableYears = Object.keys(data.total)
            .filter(y => y !== 'lastYear')
            .sort((a, b) => b - a);

        if (availableYears.length === 0) {
            titleElement.innerText = "No data found.";
            return;
        }

        availableYears.forEach(year => {
            const option = document.createElement("option");
            option.value = year;
            option.innerText = year;
            dropdown.appendChild(option);
        });

        dropdown.style.display = "block";
        dropdown.value = availableYears[0];
        renderYear(availableYears[0]);

    } catch (err) {
        titleElement.innerText = "Error loading contributions";
        console.error(err);
    }
}

function handleYearChange() {
    renderYear(document.getElementById("year-dropdown").value);
}

function renderYear(year) {
    const yearData = allContributions.filter(day => day.date.startsWith(year));
    const totalCount = yearData.reduce((sum, day) => sum + day.count, 0);
    document.getElementById("contrib-title").innerText = `${totalCount} contributions in ${year}`;

    // Render 2D
    const squaresContainer = document.getElementById("grid-squares");
    squaresContainer.innerHTML = "";
    if (yearData.length === 0) return;

    const firstDate = new Date(yearData[0].date);
    const startDayOfWeek = firstDate.getDay(); 
    
    for (let i = 0; i < startDayOfWeek; i++) {
        const spacer = document.createElement("div");
        spacer.className = "square spacer";
        squaresContainer.appendChild(spacer);
    }

    yearData.forEach(day => {
        const square = document.createElement("div");
        square.className = "square";
        square.setAttribute("data-level", day.level);
        square.title = `${day.count} contributions on ${day.date}`;
        squaresContainer.appendChild(square);
    });

    render3DCity(yearData, startDayOfWeek);
}

function render3DCity(yearData, startDayOfWeek) {
    while(cityGroup.children.length > 0){ 
        cityGroup.remove(cityGroup.children[0]); 
    }

    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const validDays = yearData.filter(day => day.date <= todayStr);

    const step = 1.2;
    const roadWidth = 1.5; // Width of the gap dividing the months

    // --- PASS 1: Calculate City Spacing with Roads ---
    let currentRoadOffset = 0;
    let lastMonth = -1;

    validDays.forEach((day, i) => {
        const m = parseInt(day.date.split('-')[1], 10) - 1;
        if (lastMonth !== -1 && m !== lastMonth) {
            currentRoadOffset += roadWidth;
        }
        day.roadOffset = currentRoadOffset;
        day.month = m;
        lastMonth = m;
    });

    // Calculate strict bounding box to perfectly center the city
    const lastDayIndex = validDays.length - 1 + startDayOfWeek;
    const totalWeeks = Math.floor(lastDayIndex / 7) + 1;
    
    // cityWidth exactly covers from 0 to the far edge of the last block
    const cityWidth = (totalWeeks * step) + currentRoadOffset; 
    const padding = 2.0;

    const baseWidth = cityWidth + padding;
    const baseDepth = (7 * step) + padding;

    // These offsets pull the city back perfectly to (0,0,0)
    const offsetX = (cityWidth - step) / 2;
    const offsetZ = (6 * step) / 2;


    // --- PASS 2: GENERATE AXIS LABELS ---
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const monthLabels = [];
    
    let mStart = 0;
    for(let i = 0; i < validDays.length; i++) {
        const isLast = (i === validDays.length - 1);
        const monthChanged = (i > 0 && validDays[i].month !== validDays[i-1].month);
        
        if (monthChanged || isLast) {
            const firstDay = validDays[mStart];
            const lastDay = validDays[i - (isLast && !monthChanged ? 0 : 1)];
            
            const firstX = (Math.floor((mStart + startDayOfWeek) / 7) * step) + firstDay.roadOffset;
            const lastX = (Math.floor((i - (isLast && !monthChanged ? 0 : 1) + startDayOfWeek) / 7) * step) + lastDay.roadOffset;
            
            // Center label visually between start and end of month block
            const centerX = (firstX + lastX) / 2;
            
            monthLabels.push({ text: monthNames[firstDay.month], pos: centerX });
            mStart = i;
        }
    }

    const dayLabels = [
        { text: "Sun", pos: 0 * step }, { text: "Mon", pos: 1 * step }, { text: "Tue", pos: 2 * step },
        { text: "Wed", pos: 3 * step }, { text: "Thu", pos: 4 * step }, { text: "Fri", pos: 5 * step }, { text: "Sat", pos: 6 * step }
    ];

    // --- PASS 3: RENDER BASE PLATFORM ---
    const baseHeight = 2;
    const usernameStr = document.getElementById("username").value.trim() || "GitHub User";

    const leftTex = createAxisTexture(dayLabels, baseDepth, 512, 128, false); 
    const backTex = createAxisTexture(monthLabels, baseWidth, 2048, 128, true); 
    const rightTex = createTextTexture(usernameStr, 512, 128, false); 
    const frontTex = createTextTexture("created by soorajstudio", 2048, 128, false); 

    const baseMesh = new THREE.Mesh(new THREE.BoxGeometry(baseWidth, baseHeight, baseDepth), [
        new THREE.MeshBasicMaterial({ map: rightTex }),
        new THREE.MeshBasicMaterial({ map: leftTex }),
        new THREE.MeshLambertMaterial({ color: 0x161b22 }),
        new THREE.MeshLambertMaterial({ color: 0x0d1117 }),
        new THREE.MeshBasicMaterial({ map: frontTex }),
        new THREE.MeshBasicMaterial({ map: backTex })
    ]);
    
    // Position base exactly at origin
    baseMesh.position.set(0, -baseHeight / 2, 0);
    cityGroup.add(baseMesh);

    // --- PASS 4: CITY BUILDINGS & NEON ROADS ---
    lastMonth = -1;

    validDays.forEach((day, i) => {
        const week = Math.floor((i + startDayOfWeek) / 7);
        const dayOfWeek = (i + startDayOfWeek) % 7;

        // Raw coordinates
        const xRaw = (week * step) + day.roadOffset;
        const zRaw = (dayOfWeek * step);

        // Apply centering offset
        const xPos = xRaw - offsetX;
        const zPos = zRaw - offsetZ;

        // Draw Neon Road when month changes!
        if (lastMonth !== -1 && day.month !== lastMonth) {
            const roadLineGeo = new THREE.PlaneGeometry(0.2, baseDepth - padding); // width of stripe, depth of city
            const roadLineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
            const roadLine = new THREE.Mesh(roadLineGeo, roadLineMat);
            
            roadLine.rotation.x = -Math.PI / 2;
            
            // Center the road line exactly in the middle of the gap
            const gapCenter = xPos - (roadWidth / 2) - (step / 2);
            roadLine.position.set(gapCenter, 0.02, 0); 
            
            cityGroup.add(roadLine);
        }
        lastMonth = day.month;

        // Taller caps for higher activity
        let h = day.count === 0 ? 0.2 : (day.count * 0.4) + 0.5;
        if (h > 15) h = 15; 

        // Building Mesh
        const cube = new THREE.Mesh(getGeometry(h), getBuildingMaterial(day.level, h));
        cube.position.set(xPos, h / 2, zPos);
        cityGroup.add(cube);

        // Add sleek rooftop antennas to the absolute tallest high-rises
        if (h > 6 && day.level > 0) {
            const spireHeight = Math.random() * 1.5 + 0.5;
            const spireGeo = new THREE.CylinderGeometry(0.04, 0.08, spireHeight, 8);
            const spireMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const spire = new THREE.Mesh(spireGeo, spireMat);
            spire.position.set(xPos, h + (spireHeight / 2), zPos);
            cityGroup.add(spire);

            // High-tech glowing beacon on the antenna tip
            const beaconGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const beaconMat = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Arc reactor blue
            const beacon = new THREE.Mesh(beaconGeo, beaconMat);
            beacon.position.set(xPos, h + spireHeight, zPos);
            cityGroup.add(beacon);
        }
    });
}

init3D();

</script>

</body>
</html>
